<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: #09090b;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: breathe 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 0 40px rgba(59,130,246,0.3);
      animation: logoPulse 2s ease-in-out infinite;
    }
    .logo svg { width: 36px; height: 36px; color: white; }
    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(59,130,246,0.3); }
      50% { box-shadow: 0 0 60px rgba(59,130,246,0.5); }
    }
    h1 {
      color: white;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #52525b;
      font-size: 12px;
      margin-bottom: 32px;
      font-weight: 400;
    }
    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: #3b82f6;
      border-right-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      color: #a1a1aa;
      font-size: 13px;
      margin-bottom: 16px;
      min-height: 20px;
      transition: opacity 0.2s ease;
    }
    .progress-wrap {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
      background-size: 200% 100%;
      border-radius: 4px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: progressShimmer 2s linear infinite;
    }
    @keyframes progressShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .progress-percent {
      color: #52525b;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      margin-top: 6px;
      min-width: 32px;
      text-align: center;
    }
    .log {
      margin-top: 20px;
      width: 280px;
      max-height: 120px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
    .log-item {
      color: #52525b;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      padding: 3px 8px;
      margin: 1px 0;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      opacity: 0;
      animation: logFadeIn 0.3s ease forwards;
    }
    @keyframes logFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .log-item.success { color: #10b981; background: rgba(16,185,129,0.08); }
    .log-item.error { color: #ef4444; background: rgba(239,68,68,0.08); }
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="dot-grid"></div>
  <div class="bg-glow"></div>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 11 5.16-1.26 9-5.45 9-11V7l-10-5z"/>
      </svg>
    </div>
    <div class="spinner-ring"></div>
    <h1>Lumina</h1>
    <div class="subtitle">AI Chat</div>
    <div class="status" id="status">Initializing...</div>
    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
    <div class="progress-percent" id="percent">0%</div>
    <div class="log" id="log"></div>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const percentEl = document.getElementById('percent');
    const logEl = document.getElementById('log');
    let currentProgress = 0;
    const steps = [
      { text: 'Starting server...', delay: 500, progress: 20 },
      { text: 'Loading modules...', delay: 800, progress: 40 },
      { text: 'Connecting to services...', delay: 1200, progress: 60 },
      { text: 'Preparing interface...', delay: 1000, progress: 80 },
      { text: 'Almost ready...', delay: 500, progress: 100 }
    ];
    function setProgress(pct) {
      currentProgress = Math.min(pct, 100);
      progressEl.style.width = currentProgress + '%';
      percentEl.textContent = Math.round(currentProgress) + '%';
    }
    function addLog(text, cls = '') {
      const el = document.createElement('div');
      el.className = 'log-item' + (cls ? ' ' + cls : '');
      el.textContent = text;
      logEl.appendChild(el);
      logEl.scrollTop = logEl.scrollHeight;
    }
    async function runSteps() {
      for (const step of steps) {
        await new Promise(r => setTimeout(r, step.delay));
        addLog(step.text, step.progress === 100 ? 'success' : '');
        setProgress(step.progress);
        statusEl.textContent = step.text;
      }
    }
    runSteps();
    window.addEventListener('message', (e) => {
      if (e.data.type === 'status') {
        addLog(e.data.text, e.data.status || '');
        statusEl.textContent = e.data.text;
        if (e.data.progress != null) setProgress(e.data.progress);
      }
    });
  </script>
</body>
</html>
