<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      background: #09090b;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeIn 0.6s ease 0.2s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(59,130,246,0.25);
      margin-bottom: 24px;
    }
    .logo svg { width: 28px; height: 28px; color: white; }

    .title {
      color: #fafafa;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.2px;
      margin-bottom: 4px;
    }

    .status {
      color: #52525b;
      font-size: 12px;
      min-height: 18px;
      margin-bottom: 28px;
      transition: color 0.2s ease;
    }
    .status.active { color: #a1a1aa; }
    .status.error { color: #ef4444; }

    .progress-wrap {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-container {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    .error-container.visible { display: flex; }
    .error-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .error-icon svg { width: 20px; height: 20px; color: #ef4444; }
    .error-text {
      color: #ef4444;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      max-width: 260px;
      line-height: 1.5;
    }
    .error-sub {
      color: #52525b;
      font-size: 11px;
      margin-top: 4px;
      text-align: center;
    }

    body.exit-active {
      transition: opacity 0.35s ease;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 11 5.16-1.26 9-5.45 9-11V7l-10-5z"/>
        <path d="M12 8v4l3 3" stroke-width="1.8"/>
      </svg>
    </div>
    <div class="spinner"></div>
    <div class="title">Lumina</div>
    <div class="status" id="status">Initializing...</div>
    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>

    <div class="error-container" id="errorContainer">
      <div class="error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <div class="error-text" id="errorText">Failed to start</div>
      <div class="error-sub" id="errorSub">Please try restarting</div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const errorContainer = document.getElementById('errorContainer');
    const errorText = document.getElementById('errorText');
    const errorSub = document.getElementById('errorSub');

    let currentProgress = 0;
    let isComplete = false;

    const steps = [
      { text: 'Starting server...', delay: 500, progress: 20 },
      { text: 'Loading modules...', delay: 800, progress: 45 },
      { text: 'Connecting services...', delay: 1000, progress: 65 },
      { text: 'Preparing interface...', delay: 800, progress: 85 },
      { text: 'Almost ready...', delay: 400, progress: 100 }
    ];

    function setProgress(pct) {
      currentProgress = Math.min(pct, 100);
      progressEl.style.width = currentProgress + '%';
    }

    function showError(message, subMessage) {
      statusEl.className = 'status error';
      statusEl.textContent = message || 'Failed to start';
      errorText.textContent = message || 'Failed to start';
      errorSub.textContent = subMessage || 'Please try restarting';
      errorContainer.classList.add('visible');
    }

    function exitLoading() {
      if (isComplete) return;
      isComplete = true;
      document.body.classList.add('exit-active');
      setTimeout(() => { document.body.style.display = 'none'; }, 400);
    }

    if (window.__electronAPI && window.__electronAPI.onLoadingStatus) {
      window.__electronAPI.onLoadingStatus((data) => {
        statusEl.textContent = data.text;
        statusEl.className = 'status' + (data.status === 'error' ? ' error' : ' active');
        if (data.progress != null) setProgress(data.progress);
        if (data.complete) exitLoading();
        if (data.status === 'error') showError(data.text, data.subMessage);
      });
    }

    async function runSteps() {
      for (const step of steps) {
        if (isComplete) return;
        await new Promise(r => setTimeout(r, step.delay));
        if (isComplete) return;
        statusEl.textContent = step.text;
        statusEl.className = 'status active';
        setProgress(step.progress);
      }
      if (!isComplete) setTimeout(exitLoading, 400);
    }

    runSteps();

    setTimeout(() => {
      if (!isComplete) {
        statusEl.textContent = 'Starting...';
        setTimeout(exitLoading, 800);
      }
    }, 15000);
  </script>
</body>
</html>
