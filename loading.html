<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina - Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      background: #09090b;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      user-select: none;
      /* Force GPU compositing */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    /* ============ Particle Background ============ */
    #particles-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      /* GPU layer */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    /* ============ Background Glow ============ */
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      will-change: transform, opacity;
      animation: breathe 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes breathe {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }

    /* ============ Container ============ */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(20px);
      animation: containerFadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }
    @keyframes containerFadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============ Logo ============ */
    .logo-wrapper {
      position: relative;
      margin-bottom: 28px;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 40px rgba(59,130,246,0.3);
      animation: logoGlow 2s ease-in-out infinite;
    }
    .logo svg { width: 36px; height: 36px; color: white; }
    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(59,130,246,0.3), 0 0 0px rgba(139,92,246,0.2); }
      50% { box-shadow: 0 0 60px rgba(59,130,246,0.5), 0 0 80px rgba(139,92,246,0.15); }
    }

    /* Expanding ripple rings around logo */
    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 72px;
      height: 72px;
      border-radius: 18px;
      border: 2px solid rgba(59,130,246,0.25);
      transform: translate(-50%, -50%) scale(1);
      opacity: 0;
      pointer-events: none;
      will-change: transform, opacity;
    }
    .ring:nth-child(2) { animation: ringExpand 2.5s ease-out 0.5s infinite; }
    .ring:nth-child(3) { animation: ringExpand 2.5s ease-out 1s infinite; }
    .ring:nth-child(4) { animation: ringExpand 2.5s ease-out 1.5s infinite; }
    .ring:nth-child(5) { animation: ringExpand 2.5s ease-out 2s infinite; }
    @keyframes ringExpand {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
    }

    /* ============ Spinner Ring ============ */
    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,0.06);
      border-top-color: #3b82f6;
      border-right-color: #8b5cf6;
      border-radius: 50%;
      will-change: transform;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ============ Title ============ */
    h1 {
      color: white;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
      position: relative;
    }
    h1 .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px) rotateX(40deg);
      animation: letterReveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    h1 .letter:nth-child(1) { animation-delay: 0.4s; }
    h1 .letter:nth-child(2) { animation-delay: 0.45s; }
    h1 .letter:nth-child(3) { animation-delay: 0.5s; }
    h1 .letter:nth-child(4) { animation-delay: 0.55s; }
    h1 .letter:nth-child(5) { animation-delay: 0.6s; }
    h1 .letter:nth-child(6) { animation-delay: 0.65s; }
    @keyframes letterReveal {
      to { opacity: 1; transform: translateY(0) rotateX(0); }
    }

    /* ============ Subtitle ============ */
    .subtitle {
      color: #52525b;
      font-size: 12px;
      margin-bottom: 32px;
      font-weight: 400;
      opacity: 0;
      animation: fadeSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
    }
    @keyframes fadeSlideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============ Status ============ */
    .status {
      color: #a1a1aa;
      font-size: 13px;
      margin-bottom: 16px;
      min-height: 20px;
      transition: opacity 0.2s ease;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.9s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ============ Progress ============ */
    .progress-wrap {
      width: 240px;
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      opacity: 0;
      animation: fadeIn 0.5s ease 1s forwards;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6);
      background-size: 200% 100%;
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      animation: progressShimmer 2s linear infinite;
    }
    @keyframes progressShimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .progress-percent {
      color: #52525b;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      margin-top: 6px;
      min-width: 32px;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.1s forwards;
    }

    /* ============ Log ============ */
    .log {
      margin-top: 20px;
      width: 280px;
      max-height: 120px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.2s forwards;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
    .log-item {
      color: #52525b;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      padding: 3px 8px;
      margin: 1px 0;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      opacity: 0;
      animation: logFadeIn 0.3s ease forwards;
    }
    @keyframes logFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .log-item.success { color: #10b981; background: rgba(16,185,129,0.08); }
    .log-item.error { color: #ef4444; background: rgba(239,68,68,0.08); }
    .log-item.info { color: #3b82f6; background: rgba(59,130,246,0.08); }

    /* ============ Dot Grid ============ */
    .dot-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    /* ============ Loading Complete - Exit Animation (GPU-only) ============ */
    body.exit-active {
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      pointer-events: none;
    }

    /* ============ Error State ============ */
    .error-container {
      display: none;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 2;
      margin-top: 20px;
    }
    .error-container.visible {
      display: flex;
      animation: fadeSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .error-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(239,68,68,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      border: 2px solid rgba(239,68,68,0.2);
    }
    .error-icon svg { width: 24px; height: 24px; color: #ef4444; }
    .error-text {
      color: #ef4444;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }
    .error-sub {
      color: #52525b;
      font-size: 11px;
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>
  <div class="dot-grid"></div>
  <div class="bg-glow" id="bgGlow"></div>

  <div class="container" id="container">
    <div class="logo-wrapper" id="logoWrapper">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 11 5.16-1.26 9-5.45 9-11V7l-10-5z"/>
          <path d="M12 8v4l3 3" stroke-width="1.8"/>
        </svg>
      </div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <div class="spinner-ring"></div>
    <h1><span class="letter">L</span><span class="letter">u</span><span class="letter">m</span><span class="letter">i</span><span class="letter">n</span><span class="letter">a</span></h1>
    <div class="subtitle">AI Chat</div>
    <div class="status" id="status">Initializing...</div>
    <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
    <div class="progress-percent" id="percent">0%</div>
    <div class="log" id="log"></div>

    <div class="error-container" id="errorContainer">
      <div class="error-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <div class="error-text" id="errorText">Failed to start application</div>
      <div class="error-sub" id="errorSub">Please try restarting</div>
    </div>
  </div>

  <script>
    // =============================================
    // Particle Background
    // =============================================
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let mouse = { x: 0, y: 0 };
    let animId;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Lightweight particle — no per-frame Math.sin, no pulse tracking
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1.2 + 0.3;
        this.speedX = (Math.random() - 0.5) * 0.1;
        this.speedY = (Math.random() - 0.5) * 0.1;
        this.opacity = Math.random() * 0.25 + 0.05;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
        ctx.fill();
      }
    }

    function initParticles() {
      const count = Math.min(Math.floor(canvas.width * canvas.height / 12000), 60);
      particles = [];
      for (let i = 0; i < count; i++) particles.push(new Particle());
    }
    initParticles();

    // Throttle connections — only draw every other frame via frameCount
    let frameCount = 0;
    function animateParticles() {
      frameCount++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
      }
      // Connections every other frame, use squared distance to avoid sqrt
      if (frameCount % 2 === 0) {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const distSq = dx * dx + dy * dy;
            if (distSq < 10000) { // 100^2
              const opacity = (1 - Math.sqrt(distSq) / 100) * 0.06;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(59,130,246,${opacity})`;
              ctx.stroke();
            }
          }
        }
      }
      animId = requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // =============================================
    // Loading Logic
    // =============================================
    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const percentEl = document.getElementById('percent');
    const logEl = document.getElementById('log');
    const container = document.getElementById('container');
    const bgGlow = document.getElementById('bgGlow');
    const errorContainer = document.getElementById('errorContainer');
    const errorText = document.getElementById('errorText');
    const errorSub = document.getElementById('errorSub');

    let currentProgress = 0;
    let isComplete = false;

    const steps = [
      { text: 'Starting server...', delay: 500, progress: 20 },
      { text: 'Loading modules...', delay: 800, progress: 40 },
      { text: 'Connecting to services...', delay: 1200, progress: 60 },
      { text: 'Preparing interface...', delay: 1000, progress: 80 },
      { text: 'Almost ready...', delay: 500, progress: 100 }
    ];

    function setProgress(pct) {
      currentProgress = Math.min(pct, 100);
      progressEl.style.width = currentProgress + '%';
      percentEl.textContent = Math.round(currentProgress) + '%';
    }

    function addLog(text, cls = '') {
      const el = document.createElement('div');
      el.className = 'log-item' + (cls ? ' ' + cls : '');
      el.textContent = text;
      logEl.appendChild(el);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function showError(message, subMessage) {
      errorText.textContent = message || 'Failed to start application';
      errorSub.textContent = subMessage || 'Please try restarting the application.';
      errorContainer.classList.add('visible');
      statusEl.style.opacity = '0.4';
      addLog('Error: ' + (message || 'Unknown error'), 'error');
    }

    function exitLoading() {
      if (isComplete) return;
      isComplete = true;
      // Stop particles to free resources
      if (animId) cancelAnimationFrame(animId);
      // Use GPU-friendly body opacity transition
      document.body.style.transition = 'opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
      document.body.style.opacity = '0';
      setTimeout(() => {
        document.body.style.display = 'none';
      }, 450);
    }

    // Listen for real-time status updates from Electron main process via IPC bridge
    if (window.__electronAPI && window.__electronAPI.onLoadingStatus) {
      window.__electronAPI.onLoadingStatus((data) => {
        addLog(data.text, data.status || '');
        statusEl.textContent = data.text;
        if (data.progress != null) {
          setProgress(data.progress);
        }
        if (data.complete) {
          exitLoading();
        }
        if (data.status === 'error') {
          showError(data.text, data.subMessage);
        }
      });
    }

    // Fallback simulation if no IPC messages received
    async function runSteps() {
      for (const step of steps) {
        if (isComplete) return;
        await new Promise(r => setTimeout(r, step.delay));
        if (isComplete) return;
        const cls = step.progress === 100 ? 'success' : '';
        addLog(step.text, cls);
        setProgress(step.progress);
        statusEl.textContent = step.text;
      }
      // Auto-complete after fallback steps if still not complete
      if (!isComplete) {
        setTimeout(exitLoading, 500);
      }
    }

    runSteps();

    // If no IPC message after a long timeout, auto-complete anyway
    setTimeout(() => {
      if (!isComplete) {
        addLog('Starting application...', 'info');
        setTimeout(exitLoading, 800);
      }
    }, 15000);
  </script>
</body>
</html>
